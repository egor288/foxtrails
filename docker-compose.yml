version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: fox-postgres
    environment:
      POSTGRES_USER: fox
      POSTGRES_PASSWORD: fox
      POSTGRES_DB: foxdb
    ports:
      - "5432:5432"
    volumes:
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foxdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: foxtrails-backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://fox:fox@postgres:5432/foxdb?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./web/foxtrails_front
    container_name: foxtrails-frontend
    ports:
      - "80:80"
    depends_on:
      - backend