events {}

http {
  include       mime.types;
  default_type  application/octet-stream;

  server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    location /assets/ {
      try_files $uri =404;
    }

    location / {
      try_files $uri /index.html;
    }

    location /api/ {
      proxy_pass http://backend:8080/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}